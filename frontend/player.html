<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ movie_title }} | Movie.Stream</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            color: #e5e5e5;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .back-btn {
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.8);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
            text-decoration: none;
        }
        .back-btn:hover {
            background: rgba(245, 197, 24, 0.9);
            color: #000;
            border-color: #f5c518;
        }
        .back-btn svg { width: 18px; height: 18px; }
        .video-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px 20px 20px;
        }
        video {
            max-width: 100%;
            max-height: calc(100vh - 80px);
            width: 100%;
            border-radius: 8px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }
        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            gap: 16px;
        }
        .loading-spinner {
            width: 48px;
            height: 48px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #f5c518;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        .loading-text { color: rgba(255,255,255,0.5); font-size: 14px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @media (max-width: 768px) {
            .back-btn { top: 8px; left: 8px; padding: 8px 16px; font-size: 13px; }
            .video-container { padding: 50px 10px 10px; }
        }
    </style>
</head>
<body>
    <a href="/" class="back-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
        Back to Movies
    </a>
    
    <div class="video-container">
        <video id="videoPlayer" controls autoplay>
            <source src="/watch?id={{ imdb_id }}" type="video/mp4">
            Your browser does not support the video tag.
        </video>
    </div>

    <script>
        const video = document.getElementById('videoPlayer');
        
        video.addEventListener('error', function(e) {
            console.error('Video error:', e);
        });
        
        video.addEventListener('waiting', function() {
            console.log('Buffering...');
        });
        
        video.addEventListener('playing', function() {
            console.log('Playing');
        });
    </script>
</body>
</html>
