events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;

    server {
        listen 80;

        location / {
            proxy_pass http://movie-stream:8973;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # FIX 1: Use 'root' instead of 'alias' to avoid URL-decoding bugs
        location /media/ {
            internal;
            root /app;
        }
        
        # FIX 2: Disable sendfile for active downloads to prevent file lock crashes
        location /tmp/ {
            internal;
            root /app;
            sendfile off; 
        }
    }
}